<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站主页</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Microsoft Yahei", sans-serif;
    }
    .main-title {
      color: #fff;
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .nav-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .nav-btn {
      padding: 18px 40px;
      background: rgba(255,255,255,0.2);
      border: 2px solid #fff;
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      position: relative;
    }
    .nav-btn:hover {
      background: #fff;
      color: #667eea;
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    /* 子菜单样式 */
    .sub-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 0;
      min-width: 200px;
      backdrop-filter: blur(10px);
      border: 1px solid #fff;
    }
    .sub-menu-item {
      padding: 12px 20px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    .sub-menu-item:hover {
      background: rgba(255,255,255,0.3);
    }
    .relax-btn-container {
      position: relative;
    }
  </style>
</head>
<body>
  <h1 class="main-title">欢迎访问我的主页</h1>
  <div class="nav-buttons">
    <!-- 给首页按钮添加id -->
    <button class="nav-btn" id="homeBtn">首页</button>
    <button class="nav-btn">关于我们</button>
    
    <!-- 轻松一刻按钮（带子菜单） -->
    <div class="relax-btn-container">
      <button class="nav-btn" id="relaxBtn">轻松一刻</button>
      <!-- 游戏子菜单 -->
      <div class="sub-menu" id="gameSubMenu">
        <div class="sub-menu-item" id="ballGameBtn">点击消除小球</div>
        <!-- 可添加更多游戏选项 -->
        <!-- <div class="sub-menu-item">其他小游戏</div> -->
      </div>
    </div>

    <button class="nav-btn">联系我们</button>
  </div>

  <script>
    // 获取元素
    const relaxBtn = document.getElementById('relaxBtn');
    const gameSubMenu = document.getElementById('gameSubMenu');
    const ballGameBtn = document.getElementById('ballGameBtn');
    // 获取首页按钮
    const homeBtn = document.getElementById('homeBtn');

    // 首页跳转逻辑
    homeBtn.addEventListener('click', () => {
      // 本地路径：http://localhost:4000/ai666.github.io/
      // GitHub Pages部署后路径：https://ai666.github.io/（自动适配）
      window.location.href = '/ai666.github.io/';
      // 若GitHub Pages部署后直接是根域名（如 ai666.github.io），可简化为：
      // window.location.href = '/';
    });

    // 展开/收起子菜单
    relaxBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // 阻止事件冒泡
      gameSubMenu.style.display = gameSubMenu.style.display === 'block' ? 'none' : 'block';
    });

    // 点击子菜单选项跳转到游戏页
    ballGameBtn.addEventListener('click', () => {
      window.location.href = 'game.html';
    });

    // 点击页面其他区域收起子菜单
    document.addEventListener('click', () => {
      gameSubMenu.style.display = 'none';
    });
  </script>
</body>
</html>
