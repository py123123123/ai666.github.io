<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>轻松一刻 - 点击消除小球</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;}
    #gameCanvas{display:block;width:100%;height:100%;}
    .game-ui{position:fixed;top:20px;left:0;width:100%;text-align:center;color:#fff;z-index:10;}
    .score{font-size:24px;font-weight:bold;margin-bottom:10px;}
    .tip{font-size:16px;opacity:0.8;}
    .start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;color:#fff;}
    .start-btn{padding:15px 30px;background:#4CAF50;border:none;border-radius:8px;font-size:20px;color:#fff;cursor:pointer;margin-top:20px;}
    .game-over{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);flex-direction:column;justify-content:center;align-items:center;z-index:20;color:#fff;}
    /* 返回主页按钮样式 */
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 30;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid #fff;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <!-- 返回主页按钮 -->
  <button class="back-home" id="backHome">返回主页</button>

  <!-- 开始界面 -->
  <div class="start-screen" id="startScreen">
    <h1>点击消除小球</h1>
    <p class="tip">点击屏幕上的小球，消除它得分！</p>
    <button class="start-btn" id="startBtn">开始游戏</button>
  </div>

  <!-- 游戏UI -->
  <div class="game-ui" style="display:none;">
    <div class="score">得分：<span id="score">0</span></div>
    <div class="tip">点击小球消除 | 限时60秒</div>
  </div>

  <!-- 游戏结束界面 -->
  <div class="game-over" id="gameOver">
    <h1>游戏结束！</h1>
    <h2>最终得分：<span id="finalScore">0</span></h2>
    <button class="start-btn" id="restartBtn">重新开始</button>
  </div>

  <!-- 游戏画布 -->
  <canvas id="gameCanvas"></canvas>

  <script>
    // 游戏核心逻辑（真实可玩）
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const gameUI = document.querySelector('.game-ui');
    const scoreEl = document.getElementById('score');
    const gameOver = document.getElementById('gameOver');
    const restartBtn = document.getElementById('restartBtn');
    const finalScoreEl = document.getElementById('finalScore');
    const backHome = document.getElementById('backHome');

    // 返回主页功能
    backHome.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    // 适配全屏
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 游戏配置
    let gameRunning = false;
    let score = 0;
    let timeLeft = 60;
    let balls = [];
    let timer = null;

    // 小球类
    class Ball {
      constructor() {
        // 随机位置（避开边缘）
        this.x = Math.random() * (canvas.width - 60) + 30;
        this.y = Math.random() * (canvas.height - 60) + 30;
        this.radius = Math.random() * 20 + 15; // 半径15-35
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`; // 随机彩色
        this.speed = Math.random() * 2 + 1; // 移动速度1-3
        // 随机移动方向
        this.dx = (Math.random() - 0.5) * this.speed;
        this.dy = (Math.random() - 0.5) * this.speed;
      }

      // 绘制小球
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 移动小球（边界反弹）
      update() {
        this.x += this.dx;
        this.y += this.dy;
        // 左右边界反弹
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
          this.dx = -this.dx;
        }
        // 上下边界反弹
        if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
          this.dy = -this.dy;
        }
        this.draw();
      }
    }

    // 生成小球
    function spawnBall() {
      if (balls.length < 8) { // 最多8个小球，避免太卡顿
        balls.push(new Ball());
      }
    }

    // 检测点击是否命中小球
    function checkClick(x, y) {
      for (let i = balls.length - 1; i >= 0; i--) {
        const ball = balls[i];
        const dx = x - ball.x;
        const dy = y - ball.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < ball.radius) {
          // 命中小球，移除并加分
          balls.splice(i, 1);
          score += 10;
          scoreEl.textContent = score;
          return;
        }
      }
    }

    // 游戏循环
    function gameLoop() {
      if (!gameRunning) return;
      // 清屏
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // 绘制所有小球
      balls.forEach(ball => ball.update());
      // 持续生成小球
      spawnBall();
      requestAnimationFrame(gameLoop);
    }

    // 开始游戏
    function startGame() {
      // 重置状态
      gameRunning = true;
      score = 0;
      timeLeft = 60;
      balls = [];
      // 隐藏开始界面，显示游戏UI
      startScreen.style.display = 'none';
      gameUI.style.display = 'block';
      gameOver.style.display = 'none';
      scoreEl.textContent = score;
      // 启动计时器
      timer = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
      // 启动游戏循环
      gameLoop();
    }

    // 结束游戏
    function endGame() {
      gameRunning = false;
      clearInterval(timer);
      // 显示结束界面
      gameUI.style.display = 'none';
      gameOver.style.display = 'flex';
      finalScoreEl.textContent = score;
    }

    // 事件绑定
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // 鼠标/触摸点击事件
    canvas.addEventListener('mousedown', (e) => {
      if (!gameRunning) return;
      checkClick(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
      if (!gameRunning) return;
      e.preventDefault();
      const touch = e.touches[0];
      checkClick(touch.clientX, touch.clientY);
    });
  </script>
</body>
</html>
